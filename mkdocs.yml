site_name: xurry的代码空间  # 你的网站标题
site_url: https://xurry.github.io/  # 部署后的网址
copyright: Copyright &copy; 2026 xurry # 底部版权声明，提升正式感

theme:
  name: material
  logo: assets/logo.png
  # 浏览器标签栏的小图标
  favicon: assets/dog.png
  # 还可以顺便改一下配色，让它更有个性

  # 1. 【排版升级】设置更优雅的阅读字体和代码字体
  font:
    text: Noto Sans SC  # 谷歌开源的无衬线中文字体，阅读体验极佳
    code: Fira Code     # 程序员必备的等宽连字字体，代码块会变得非常好看

  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom # 主色调（顶部栏）
      accent: light green # 交互色（链接、按钮)
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: light green
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  language: zh

  features:
    - navigation.tabs          # 开启顶部一级导航栏
    - navigation.sections      # 侧边栏分组显示
    # - navigation.expand      # 【已注释】关闭默认展开，这样左侧目录就可以收起来了！
    - navigation.indexes       # 点击目录章节名可直接进入该目录的 index.md
    - navigation.top           # 显示“回到顶部”按钮
    - search.suggest           # 搜索建议
    - content.code.copy        # 代码块一键复制按钮
    # 【布局升级】新增的沉浸式高级特性
    - navigation.footer        # 在页面底部显示“上一页/下一页”的漂亮按钮
    - toc.integrate            # 将当前页的右侧目录树整合进左侧边栏，让版面更清爽大气
    - header.autohide          # 页面向下滚动时自动隐藏顶部栏，提供沉浸式阅读空间
    - search.highlight         # 搜索结果关键词高亮显示

# 这里是核心：手动定义导航结构，实现示例那种层级
nav:
  - 🏠首页: index.md
  - 🧩c++基础:
      - vector: c++基础/vector.md
      - stack: c++基础/stack.md
      - queue: c++基础/queue.md
      - set: c++基础/set.md
      - string: c++基础/string.md
      - map: c++基础/map.md
      - priority_queue(优先队列): c++基础/priority_queue(优先队列).md
  - 🐍python基础:
      - 引言: python基础/引言.md
      - 第1章：接触输入输出、变量、简单程序: python基础/第1章：接触输入输出、变量、简单程序.md
      - 第2章：字符串、列表、字典、元组: python基础/第2章：字符串、列表、字典、元组.md
      - 第3章：顺序结构、选择结构、循环结构: python基础/第3章：顺序结构、选择结构、循环结构.md
      - 第4章：函数与模块: python基础/第4章：函数与模块.md
      - 第5章：面向对象基础: python基础/第5章：面向对象基础.md
      - 第6章：文件与文件夹操作: python基础/第6章：文件与文件夹操作.md  
      - 第7章：重点突破--Numpy库: python基础/第7章：重点突破--Numpy库.ipynb
  - 🧠算法课洛谷习题:
      - 引言: 洛谷题目/引言.md
      - 洛谷1_1(二分)查找:
          - 二分查找概念: 洛谷题目/1_1/二分查找.md
          - 题1查找: 洛谷题目/1_1/题1查找.md
          - 题2一元三次方程求解: 洛谷题目/1_1/题2一元三次方程求解.md
          - 题3EKO砍树: 洛谷题目/1_1/题3EKO砍树.md
          - 题4A-B数对: 洛谷题目/1_1/题4A-B数对.md
      - 洛谷3_1快速排序: 洛谷题目/3_1/快速排序.md
      - 洛谷3_2快排的应用题: 洛谷题目/3_2/快排的应用题.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kingpoints266-cell
    - icon: fontawesome/solid/paper-plane
      link: mailto:2897964385@qq.com

markdown_extensions:
  - tables #制表
  # --- 原有配置 ---
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:      
      alternate_style: true 
  - pymdownx.emoji:       
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true    # 启用更强大的代码高亮引擎
  - pymdownx.inlinehilite
  - pymdownx.snippets
  
  # 3. 【内容表现力升级】让你的笔记更加硬核且美观
  - pymdownx.mark           # 支持 ==高亮文本== 语法，就像用荧光笔划重点
  - pymdownx.keys           # 支持 ++ctrl+c++ 语法，将快捷键渲染成漂亮的按键样式
  - pymdownx.tasklist:      # 支持漂亮的待办事项框，方便记录复习进度或 Todo list
      custom_checkbox: true
  - pymdownx.arithmatex:    # 开启数学公式渲染支持（对算法原理和数学推导极其重要）
      generic: true

#在文件最底部引入 CSS
extra_css:
  - stylesheets/extra.css

# 配合数学公式渲染所需的外部脚本
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 👇 新增这块内容
plugins:
  - search # MkDocs 自带的搜索功能（建议保留）
  - mkdocs-jupyter:
      execute: false # 推荐设为 false。表示构建网页时不重新运行一遍代码，直接使用原来运行好的结果，这样速度更快。