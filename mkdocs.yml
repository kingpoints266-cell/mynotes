site_name: xurry的代码空间  # 你的网站标题
site_url: https://xurry.github.io/  # 部署后的网址

theme:
  name: material
  logo: assets/logo.png
  # 浏览器标签栏的小图标
  favicon: assets/logo.png
  # 还可以顺便改一下配色，让它更有个性
  palette:
    primary: indigo # 主色调（顶部栏）
    accent: indigo  # 交互色（链接、按钮)
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  language: zh
  features:
    - navigation.tabs          # 开启顶部一级导航栏
    - navigation.sections      # 侧边栏分组显示
    - navigation.expand        # 默认展开左侧目录
    - navigation.indexes       # 点击目录章节名可直接进入该目录的 index.md
    - navigation.top           # 显示“回到顶部”按钮
    - search.suggest           # 搜索建议
    - content.code.copy        # 代码块一键复制按钮

# 这里是核心：手动定义导航结构，实现示例那种层级
nav:
  - 🏠首页: index.md
  - c++基础:
      - vector: c++基础/vector.md
      - stack: c++基础/stack.md
      - queue: c++基础/queue.md
      - set: c++基础/set.md
      - string: c++基础/string.md
      - map: c++基础/map.md
      - priority_queue(优先队列): c++基础/priority_queue(优先队列).md
    
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kingpoints266-cell
    - icon: fontawesome/solid/paper-plane
      link: mailto:2897964385@qq.com

markdown_extensions:
  - pymdownx.superfences  # 支持像 Obsidian 一样的 Callouts（警告框）
  - pymdownx.tabbed:      # 支持选项卡切换（示例里经常用到）
      alternate_style: true 
  - pymdownx.emoji:       # 支持表情符号
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg