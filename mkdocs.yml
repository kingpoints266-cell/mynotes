markdown_extensions:
  - tables #制表
  # --- 原有配置 ---
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:      
      alternate_style: true 
  - pymdownx.emoji:       
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true    # 启用更强大的代码高亮引擎
  - pymdownx.inlinehilite
  - pymdownx.snippets
  
  # 3. 【内容表现力升级】让你的笔记更加硬核且美观
  - pymdownx.mark           # 支持 ==高亮文本== 语法，就像用荧光笔划重点
  - pymdownx.keys           # 支持 ++ctrl+c++ 语法，将快捷键渲染成漂亮的按键样式
  - pymdownx.tasklist:      # 支持漂亮的待办事项框，方便记录复习进度或 Todo list
      custom_checkbox: true
  - pymdownx.arithmatex:    # 开启数学公式渲染支持（对算法原理和数学推导极其重要）
      generic: true

#在文件最底部引入 CSS
extra_css:
  - stylesheets/extra.css

# 配合数学公式渲染所需的外部脚本
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 👇 新增这块内容
plugins:
  - search # MkDocs 自带的搜索功能（建议保留）
  - mkdocs-jupyter:
      execute: false # 推荐设为 false。表示构建网页时不重新运行一遍代码，直接使用原来运行好的结果，这样速度更快。